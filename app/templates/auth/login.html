<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo-Kpafol</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="c-image">
            <img src="{{ url_for('static', filename='images/auth-image.png') }}" alt="">
        </div>
        <div class="c-inscription">
            <div class="c-connection">
                <h1>Content de te revoir</h1>
                <p>Vous n'avez pas de compte ? 
                    <a href="{{ url_for('auth.register') }}">S'inscrire ici</a></p>
            </div>  
            <div class="c-formulaire">
                <form class="form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="tracyseka@gmail.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Mot de passe</label>
                        <div class="password-input">
                            <input type="password" id="password" name="password" placeholder="••••••••••••" required>
                            <span class="toggle-password">👁</span>
                        </div>
                    </div>
                    
                    <button type="submit" class="submit-btn">Se connecter</button>
                    
                    <div class="forgot-password">
                        <a href="#" class="forgot-link">Mot de passe oublié ?</a>
                    </div>
                </form>
            </div>
        </div>
        
    </div>
</body>
</html>
