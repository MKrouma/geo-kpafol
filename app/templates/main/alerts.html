{% extends 'main/base.html' %}

{% block dashboard %}
<div class='alerts'>
    <div class="a-left">
        <h2>Alertes des détections</h2>
    </div>
    <div class="a-right">
    </div>
</div>

<!-- Optional: small inline script hook to toggle panels when user clicks a list item.
     You can move this to a separate JS file. -->
<script>
document.addEventListener('DOMContentLoaded', function(){
  const list = document.getElementById('alerts-list');
  if (!list) return;
  list.addEventListener('click', (e) => {
    const item = e.target.closest('.alert-item');
    if (!item) return;
    // ideally fetch detail by id; here we simply toggle example panels
    document.getElementById('empty-state').style.display = 'none';
    const panel = document.getElementById('detail-panel');
    panel.style.display = 'block';
    // populate fields if you have data attributes or a detail API
  });
});
</script>
{% endblock %}
